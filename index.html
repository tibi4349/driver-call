<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <title>Kezdőlap</title>
<link rel="icon" type="image/png" href="icon-192.png" sizes="32x32">
<link rel="manifest" href="manifest.json">

<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="SoforApp">
<link rel="apple-touch-icon" href="icon-192.png">

<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>  
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>  


    <style>
        body { margin: 0; font-family: Arial; }

        header {
            background: #0c2541;
            color: white;
            padding: 20px;
            position: relative;
            text-align: center;
        }

        header img {
            height: 50px;
            position: absolute;
            left: 20px;
            top: 50%;
            transform: translateY(-50%);
        }
	#userInfo {
    		position: absolute;
    		right: 20px;
    		top: 20px;
    		display: flex;
    		align-items: center;
		gap: 10px;
	}
	#userInfo span {
    		font-weight: bold;
	}
	#logoutBtn {
    		background-color: #3e5171;
    		color: white;
    		border: none;
    		padding: 5px 10px;
    		border-radius: 4px;
    		cursor: pointer;
	}
	#logoutBtn:hover {
    		background-color: #556a9e;
	}

        nav { background: #3e5171; padding: 10px; text-align: center; }
        nav a { color: white; margin: 10px; text-decoration: none; }

        .content { padding: 20px; text-align: center; }

        table {
            margin: 0 auto;
            border-collapse: collapse;
            width: 90%;
        }

        th, td {
            border: 1px solid #333;
            padding: 10px;
        }

        th {
            background: #0c2541;
            color: white;
        }
        td {
            background: #e0f1ff;
            border: 1px solid white;
            padding: 10px;
        }
        html, body {
            height: 100%;
            margin: 0;
            font-family: Arial;
            display: flex;
            flex-direction: column;
        }
        .content {
            flex: 1;
            padding: 20px;
            text-align: center;
        }
        footer {
            background: #0c2541;
            color: white;
            text-align: center;
            padding: 15px 10px;
            font-size: 14px;
            position: relative;
            bottom: 0;
            width: 100%;
        }
    </style>
</head>

<body>

<header>
    <h1>Sofőr lista</h1>
    <div id="userInfo">
        <span id="welcomeText"></span>
        <button id="logoutBtn" style="display:none;">Kijelentkezés</button>
    </div>
</header>

<nav>
    <a href="index.html">Kezdőlap</a>
    <a href="regist.html" id="menuRegist">Sofőr regisztrálás</a>
    <a href="kapcs.html">Bejelentkezés</a>
    <a href="reg.html" id="adminMenuRegisztráció" style="display:none;">Regisztráció</a>
    <a href="adatok.html" id="adminMenuAdatok" style="display:none;">Adatok</a>
    <a href="riport.html" id="adminMenuRiport" style="display:none;">Riport</a>

</nav>

<div class="content">

    <table id="tabla"></table>
</div>

<footer>
    <p>Copyright © 2026. Minden jog fenntartva!</p>
</footer>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyAdt7j6PP4FPJIq0iuYgPsk06JWTAFuYbY",
  authDomain: "soforok-web.firebaseapp.com",
  projectId: "soforok-web",
  storageBucket: "soforok-web.firebasestorage.app",
  messagingSenderId: "230693627452",
  appId: "1:230693627452:web:f7357016467b1fc1024539"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

let tabla = document.getElementById("tabla");
const currentUser = sessionStorage.getItem("user");
const isLoggedIn = currentUser && currentUser.trim() !== "";

db.collection("soforok")
	.orderBy("remark1", "desc")
	.onSnapshot((snapshot) => {
	if (!isLoggedIn) {
    	tabla.innerHTML = "<p>Az adatok megtekintéséhez bejelentkezés szükséges.</p>";
    	return;
}
    tabla.innerHTML = `
        <tr>
		${isLoggedIn ? '<th>Ref.</th>' : ''}
        	${isLoggedIn ? '<th>Rendszám</th>' : ''}
        	${isLoggedIn ? '<th>Telefonszám</th>' : ''}
        	${isLoggedIn ? '<th>Szünet</th>' : ''}
        	${isLoggedIn ? '<th>Állapot</th>' : ''}
        	${isLoggedIn ? '<th>Kapu</th>' : ''}
        	${isLoggedIn ? '<th>Érkezett</th>' : ''}
        	${isLoggedIn ? '<th>Elment</th>' : ''}
        	${!isLoggedIn ? '<th>Információ</th>' : ''}
        </tr>
    `;

    snapshot.forEach((doc) => {
        let sofor = doc.data();

        tabla.innerHTML += `
            <tr>
		${isLoggedIn ? `<td>${sofor.ref}</td>` : ''}
        	${isLoggedIn ? `<td>${sofor.rendszam}</td>` : ''}
        	${isLoggedIn ? `<td>${sofor.telefon}</td>` : ''}
        	${isLoggedIn ? `<td>${sofor.szunet}</td>` : ''}
        	${isLoggedIn ? `<td>${sofor.allapot || "-"}</td>` : ''}
        	${isLoggedIn ? `<td>${sofor.kapu || "-"}</td>` : ''}
        	${isLoggedIn ? `<td>${sofor.remark1 || ""}</td>` : ''}
        	${isLoggedIn ? `<td>${sofor.remark2 || ""}</td>` : ''}
        	${!isLoggedIn ? `<td style="color: #666; font-style: italic;">Kérjük, jelentkezzen be az adatok megtekintéséhez!</td>` : ''}
            </tr>
        `;
    });
});

if (sessionStorage.getItem("user") === "Admin" || sessionStorage.getItem("role") === "admin") {
    document.getElementById("adminMenuAdatok").style.display = "inline";
    document.getElementById("adminMenuRiport").style.display = "inline";
    document.getElementById("adminMenuRegisztráció").style.display = "inline";
}
const username = sessionStorage.getItem("user");
if (username) {
    document.getElementById("welcomeText").textContent = `Üdv, ${username}!`;
    document.getElementById("logoutBtn").style.display = "inline-block";
} else {
    document.getElementById("welcomeText").textContent = "Nincs bejelentkezve";
}
document.getElementById("logoutBtn").addEventListener("click", () => {
    sessionStorage.clear();
    window.location.href = "index.html"; // vissza a bejelentkező oldalra
});
if (!sessionStorage.getItem("user")) {
    document.getElementById("menuRegist").style.display = "none";
}
const navProtectedLinks = document.querySelectorAll(".protected-link");
const loggedUser = sessionStorage.getItem("user");

if (!loggedUser) {
    navProtectedLinks.forEach(link => {
        link.style.display = "none";
    });
} else {
    navProtectedLinks.forEach(link => {
        link.style.display = "inline";
    });
}

if (!sessionStorage.getItem("user")) {
    document.getElementById("menuRegist").style.display = "none";
}
</script>

</body>
</html>
